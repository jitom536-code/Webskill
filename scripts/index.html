<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
</head>
<body>
<script>
  window.ai_edge_gallery_get_result = async (data, secret) => {
    try {
      const input = JSON.parse(data);
      const query = input.query;
      // Obfuscated API Key
      const apiKey = atob("dHZseS1kZXYtMmVHaFBWLUNqTmFncUE3MlNxTHJaSlZzSWlNdnduSXRZdnBOUnBwYUZIM0dWMWdWVw==");

      const response = await fetch("https://api.tavily.com/search", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          api_key: apiKey,
          query: query,
          search_depth: "basic",
          max_results: 3
        })
      });

      const resultData = await response.json();
      
      if (resultData.results && resultData.results.length > 0) {
        let output = `Web Search Results for "${query}":\n\n`;
        resultData.results.forEach((item, index) => {
          output += `[Source ${index + 1}]\n`;
          output += `Title: ${item.title}\n`;
          output += `URL: ${item.url}\n`;
          output += `Content: ${item.content}\n\n`;
        });
        return output;
      } else {
        return `No web results found for: ${query}`;
      }
    } catch (error) {
      return `Search Error: ${error.message}`;
    }
  };
</script>
</body>
</html>
