<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
</head>
<body>
<script>
  window.ai_edge_gallery_get_result = async (data, secret) => {
    try {
      let input;
      try {
        input = typeof data === 'string' ? JSON.parse(data) : data;
      } catch (e) {
        input = data;
      }
      
      const query = (input.query || input.topic || input.q || "").trim();
      if (!query) {
        return JSON.stringify({ error: "No search query provided." });
      }

      // Replace 'YOUR_TAVILY_API_KEY' with your actual Tavily API key (e.g., "tvly-xxxx")
      const apiKey = "YOUR_TAVILY_API_KEY";

      const response = await fetch("https://api.tavily.com/search", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          api_key: apiKey,
          query: query,
          search_depth: "basic",
          max_results: 3
        })
      });

      const resultData = await response.json();
      
      if (resultData.results && resultData.results.length > 0) {
        let output = `Web Search Results for "${query}":\n\n`;
        resultData.results.forEach((item, index) => {
          output += `[Source ${index + 1}]\n`;
          output += `Title: ${item.title}\n`;
          output += `URL: ${item.url}\n`;
          output += `Content: ${item.content}\n\n`;
        });
        return JSON.stringify({ result: output });
      } else {
        return JSON.stringify({ result: `No web results found for: ${query}` });
      }
    } catch (error) {
      return JSON.stringify({ error: error.message });
    }
  };
</script>
</body>
</html>
